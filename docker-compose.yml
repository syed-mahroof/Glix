version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: watchtracker_db
    environment:
      POSTGRES_DB: watchtracker
      POSTGRES_USER: watchtracker
      POSTGRES_PASSWORD: watchtracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: watchtracker_redis
    # Intentionally not exposing port 6379 to the host system 
    # to avoid conflicts with your native Windows Redis installation.
    # The containers below will connect directly to it via Docker networking.
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: watchtracker_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/2
    depends_on:
      - db
      - redis
    restart: unless-stopped

  celery:
    build: ./backend
    container_name: watchtracker_celery
    command: celery -A config worker -l INFO
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/2
    depends_on:
      - db
      - redis
    restart: unless-stopped

  celery-beat:
    build: ./backend
    container_name: watchtracker_celery_beat
    # Without this service, CELERY_BEAT_SCHEDULE in settings is dead
    # config: a worker alone only runs tasks it's told to run, it never
    # fires anything on a schedule. This is what actually triggers
    # sync_active_shows / send_weekly_digest, which is what makes push
    # notifications go out at all.
    command: celery -A config beat -l INFO
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/2
    depends_on:
      - db
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
